name: Vault
options:
  bundleIdPrefix: com.chadnewbry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  Vault:
    type: application
    platform: iOS
    sources:
      - path: Vault
        excludes:
          - Widgets/**
          - WatchApp/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chadnewbry.vault
        DEVELOPMENT_TEAM: 62R87RHN6R
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Vault
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Vault uses the camera to scan and photograph insurance documents, receipts, and appraisals for your watch collection."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Vault accesses your photo library to import documents and watch photos."

  VaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VaultTests
    dependencies:
      - target: Vault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chadnewbry.vault.tests
        DEVELOPMENT_TEAM: 62R87RHN6R
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
