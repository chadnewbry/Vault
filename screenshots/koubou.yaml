# Koubou screenshot config for Vault
# App Store screenshot compositions for secure storage / password & document vault

screenshots:
  - name: vault-home
    output_size: "iPhone6_9"
    background:
      gradient:
        colors: ["#1A237E", "#283593"]
        direction: "top_to_bottom"
    device:
      type: "iPhone 15 Pro Portrait"
      screenshot: "raw/01-vault-home.png"
      position: "bottom-center"
      offset_y: 180
    text:
      headline: "Your Secure Vault"
      subtitle: "Passwords, documents, all protected"
      color: "#FFFFFF"
      position: "top-center"
      offset_y: 120

